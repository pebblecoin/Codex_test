<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hud">
        <div>
          <h1>Snake</h1>
          <p class="status" id="status">Running</p>
        </div>
        <div class="score">Score: <span id="score">0</span></div>
      </header>

      <section class="board-wrap">
        <div id="board" class="board" role="application" aria-label="Snake board"></div>
      </section>

      <section class="controls">
        <button id="pauseBtn" type="button">Pause</button>
        <button id="restartBtn" type="button">Restart</button>
      </section>

      <section class="mobile-controls" aria-label="Touch controls">
        <button data-dir="UP" type="button">Up</button>
        <div>
          <button data-dir="LEFT" type="button">Left</button>
          <button data-dir="DOWN" type="button">Down</button>
          <button data-dir="RIGHT" type="button">Right</button>
        </div>
      </section>

      <p class="help">Use Arrow keys or WASD. Space toggles pause.</p>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
